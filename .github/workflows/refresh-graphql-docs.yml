name: Refresh GraphQL API Reference

on:
  schedule:
    - cron: '23 7 * * 1'   # Every Monday ~7:23 AM UTC
  workflow_dispatch:         # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check upstream for changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # These are the exact files that build_reference.py fetches from github/docs.
          # We check their blob SHAs to detect upstream changes without cloning the repo.
          FILES=(
            "src/graphql/data/fpt/schema.json"
            "src/graphql/data/fpt/changelog.json"
            "content/graphql/overview/about-the-graphql-api.md"
            "content/graphql/guides/introduction-to-graphql.md"
            "content/graphql/guides/forming-calls-with-graphql.md"
            "content/graphql/guides/using-pagination-in-the-graphql-api.md"
            "content/graphql/guides/using-global-node-ids.md"
            "content/graphql/guides/migrating-from-rest-to-graphql.md"
            "content/graphql/guides/using-the-graphql-api-for-discussions.md"
            "content/graphql/guides/managing-enterprise-accounts.md"
            "content/graphql/overview/rate-limits-and-query-limits-for-the-graphql-api.md"
            "content/graphql/overview/breaking-changes.md"
          )

          SHAS=""
          for f in "${FILES[@]}"; do
            SHA=$(gh api "repos/github/docs/contents/$f" --jq '.sha' 2>/dev/null || echo "missing")
            SHAS="${SHAS}${SHA}\n"
          done

          NEW_HASH=$(printf '%b' "$SHAS" | sha256sum | cut -d' ' -f1)
          HASH_FILE="plugins/github-graphql-api/.upstream-shas"

          if [ -f "$HASH_FILE" ] && [ "$(cat "$HASH_FILE")" = "$NEW_HASH" ]; then
            echo "No upstream changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream changes detected!"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$NEW_HASH" > "$HASH_FILE"
          fi

      - name: Set up Python
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        if: steps.check.outputs.changed == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Build reference docs
        if: steps.check.outputs.changed == 'true'
        working-directory: plugins/github-graphql-api/scripts
        run: uv run build_reference.py --fetch

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/github-graphql-api/
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh GitHub GraphQL API reference docs

          Upstream source files in github/docs have been updated.
          Auto-generated by GitHub Actions."
          git push
